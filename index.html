<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Reação - ThinkYoung</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Clique no Quadrado</h1>

    <div id="gameArea">

    </div>

    <button onclick="startGame()" class="btn-start">Start</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
